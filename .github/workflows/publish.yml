name: publish
run-name: "${{ format('release {0}', inputs.bump) }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write

jobs:
  full-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/cli"

      - name: Run full checks
        run: bun run check:ci

  publish:
    runs-on: ubuntu-latest
    needs: [full-check]
    if: github.repository == 'kenryu42/claude-code-safety-net'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org

      - name: Install dependencies
        run: bun install
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/cli"

      - name: Debug environment
        run: |
          echo "=== Bun version ==="
          bun --version
          echo "=== Node version ==="
          node --version
          echo "=== Current directory ==="
          pwd
          echo "=== List src/ ==="
          ls -la src/
          echo "=== package.json scripts ==="
          cat package.json | jq '.scripts'


      - name: Publish
        run: bun run scripts/publish.ts
        env:
          BUMP: ${{ inputs.bump }}
          VERSION: ${{ inputs.version }}
          CI: true
          HUSKY: "0"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Delete draft release
        run: gh release delete next --yes 2>/dev/null || echo "No draft release to delete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(jq -r '.version' package.json)
          git checkout main
          git merge --ff-only "v${VERSION}" || git reset --hard "v${VERSION}"
          git push -f origin main
        env:
          HUSKY: "0"
